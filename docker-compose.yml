services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  connect4:
    build: .
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - LISP_AI_DEPTH=4
      - LISP_AI_MAX_DEPTH=8
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAX_GAME_SLOTS=4
      - GAME_TTL_SECONDS=300
    # Uncomment for development - allows editing static files without rebuilding
    # volumes:
    #   - ./static:/app/static:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  redis-data:
