<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 · Lisp AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0221;
            --surface: #1a0a2e;
            --border: #ff00ff;
            --text: #ffffff;
            --text-dim: #b366ff;
            --pink: #ff00ff;
            --cyan: #00ffff;
            --yellow: #ffff00;
            --pink-glow: rgba(255, 0, 255, 0.6);
            --cyan-glow: rgba(0, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 20px;
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .theme-select {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .theme-select select {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            padding: 6px 10px;
            background: var(--surface);
            border: 1px solid var(--pink);
            color: var(--text);
            cursor: pointer;
        }

        .theme-select select option {
            background: #1a0a2e;
            color: #ffffff;
        }

        .theme-select select:hover {
            box-shadow: 0 0 10px var(--pink-glow);
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        header {
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--pink), var(--cyan), var(--pink));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s linear infinite;
            text-shadow: 0 0 30px var(--pink-glow);
            filter: drop-shadow(0 0 20px var(--pink-glow));
        }

        @keyframes gradient-shift {
            to { background-position: 200% center; }
        }

        .tagline {
            font-size: 0.8rem;
            color: var(--cyan);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--cyan-glow);
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 10px 24px;
            background: transparent;
            border: 2px solid var(--pink);
            color: var(--pink);
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,0,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            box-shadow: 0 0 30px var(--pink-glow), inset 0 0 20px rgba(255,0,255,0.2);
            text-shadow: 0 0 10px var(--pink);
        }

        .btn.game-active {
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 20px var(--cyan-glow);
            animation: neon-flicker 2s infinite;
        }

        @keyframes neon-flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            96% { opacity: 0.9; }
            97% { opacity: 1; }
        }

        .settings-row {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 20px;
            background: rgba(255, 0, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.3);
            transition: opacity 0.3s;
        }

        .settings-row.locked {
            pointer-events: none;
        }
        .settings-row.locked .setting-group {
            opacity: 0.4;
        }

        .setting-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            transition: all 0.2s;
        }

        .toggle-label.active {
            color: var(--text);
            text-shadow: 0 0 10px currentColor;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 22px;
            cursor: pointer;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            border: 2px solid var(--pink);
            transition: all 0.3s;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background: var(--pink);
            box-shadow: 0 0 10px var(--pink);
            transition: transform 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            border-color: var(--cyan);
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(22px);
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
        }

        .depth-select {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            padding: 4px 8px;
            background: var(--bg);
            border: 1px solid var(--pink);
            color: var(--text);
            cursor: pointer;
        }

        .depth-select option {
            background: #1a0a2e;
            color: #ffffff;
        }

        .board-wrapper {
            background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(0,255,255,0.1));
            border: 2px solid;
            border-image: linear-gradient(135deg, var(--pink), var(--cyan)) 1;
            padding: 16px;
            margin-bottom: 16px;
            position: relative;
        }

        .board-wrapper::before,
        .board-wrapper::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--cyan);
        }

        .board-wrapper::before {
            top: -5px;
            left: -5px;
            border-right: none;
            border-bottom: none;
        }

        .board-wrapper::after {
            bottom: -5px;
            right: -5px;
            border-left: none;
            border-top: none;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cell:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .cell.player {
            background: radial-gradient(circle at 30% 30%, #ff66ff, var(--pink));
            border-color: var(--pink);
            box-shadow: 0 0 20px var(--pink-glow), inset 0 0 10px rgba(255,255,255,0.3);
        }

        .cell.ai {
            background: radial-gradient(circle at 30% 30%, #66ffff, var(--cyan));
            border-color: var(--cyan);
            box-shadow: 0 0 20px var(--cyan-glow), inset 0 0 10px rgba(255,255,255,0.3);
        }

        .cell.dropping {
            animation: drop 0.4s ease-in;
        }

        @keyframes drop {
            from { transform: translateY(var(--drop-distance, -100px)); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .cell.winning {
            animation: neon-pulse 0.4s ease-in-out infinite alternate;
        }

        @keyframes neon-pulse {
            to { 
                transform: scale(1.15);
                box-shadow: 0 0 40px currentColor;
            }
        }

        .columns {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .col-num {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px;
            transition: all 0.2s;
        }

        .col-num:hover,
        .col-num.selected {
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 0, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.3);
            margin-bottom: 16px;
        }

        .status {
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status.win { color: var(--cyan); text-shadow: 0 0 15px var(--cyan); }
        .status.lose { color: var(--pink); text-shadow: 0 0 15px var(--pink); }

        .stats {
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #ff00ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .spinner.active {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }


        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .legend-dot.player { 
            background: var(--pink); 
            box-shadow: 0 0 10px var(--pink);
        }

        .legend-dot.ai {
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
        }

        .slot-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .slot-indicator .slot-count {
            font-weight: 600;
        }

        .slot-indicator .slot-count.slots-full {
            color: var(--coral, #f87171);
        }

        .slot-refresh {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 2px;
            line-height: 1;
            transition: transform 0.3s;
        }

        .slot-refresh:hover { color: var(--text); }
        .slot-refresh.refreshing { animation: spin 0.6s linear; }

        /* Debug */
        .debug-check {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-dim);
            cursor: pointer;
            margin-left: 16px;
        }
        .debug-check:hover { color: var(--text); }
        .debug-check input { cursor: pointer; }
        .settings-row.locked .debug-check { opacity: 1; pointer-events: auto; }
        .settings-row.locked .debug-check input { pointer-events: auto; }

        .debug-panel {
            display: none;
            margin-top: 16px;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--accent);
            border-radius: 10px;
        }

        .debug-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .debug-row span:first-child { color: var(--text-dim); }
        .debug-row span:last-child { color: var(--text); font-weight: 600; }

        .debug-scores {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 12px 0;
        }

        .debug-col {
            flex: 1;
            min-width: 0;
            text-align: center;
            padding: 8px 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            overflow: hidden;
        }

        .debug-col .num {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .debug-col .score {
            font-family: monospace;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .debug-col .score.pos { color: #4ade80; }
        .debug-col .score.neg { color: #f87171; }
        .debug-col .score.best { color: #fbbf24; }
        .debug-col .score.x { color: var(--text-dim); opacity: 0.5; }

        .debug-chose {
            text-align: center;
            font-size: 0.9rem;
            padding-top: 8px;
        }

        .debug-chose span {
            color: var(--yellow, #fbbf24);
            font-weight: bold;
        }


        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .keys {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 0, 255, 0.2);
            font-size: 0.6rem;
            opacity: 0.5;
        }

        .version {
            margin-top: 6px;
            font-size: 0.55rem;
            opacity: 0.4;
        }

        @media (max-width: 500px) {
            .settings-row { flex-direction: column; gap: 12px; }
        }
    
        

    </style>
</head>
<body>
    <div class="theme-select">
        <span>Theme:</span>
        <select id="theme-dropdown" onchange="window.location.href=this.value">
            <option value="modern.html">Modern</option>
            <option value="arcade.html">Arcade</option>
            <option value="terminal.html">Terminal</option>
            <option value="neon.html" selected>Neon</option>
            <option value="paper.html">Paper</option>
            <option value="midnight.html">Midnight</option>
            <option value="sunset.html">Sunset</option>
            <option value="hacker.html">Hacker</option>
        </select>
    </div>

    <div class="container">
        <header>
            <h1>CONNECT 4</h1>
            <p class="tagline">Lisp AI Engine</p>
        </header>

        <div class="controls">
            <button class="btn" id="new-game">New Game</button>
            <div class="settings-row" id="settings-row">
                <div class="setting-group">
                    <span class="setting-label">First</span>
                    <div class="toggle-container">
                        <span class="toggle-label active" id="label-you">You</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="ai-first-toggle">
                            <span class="toggle-slider"></span>
                        </label>
                        <span class="toggle-label" id="label-ai">AI</span>
                    </div>
                </div>
                <div class="setting-group">
                    <span class="setting-label">Depth</span>
                    <select id="depth" class="depth-select">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4" selected>4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                    </select>
                </div>
            <label class="debug-check"><input type="checkbox" id="debug-mode"><span>Debug</span></label></div>
        </div>

        <div class="board-wrapper">
            <div class="board" id="board"></div>
            <div class="columns">
                <span class="col-num" data-col="0">1</span>
                <span class="col-num" data-col="1">2</span>
                <span class="col-num" data-col="2">3</span>
                <span class="col-num" data-col="3">4</span>
                <span class="col-num" data-col="4">5</span>
                <span class="col-num" data-col="5">6</span>
                <span class="col-num" data-col="6">7</span>
            </div>
        </div>

        <div class="status-bar">
            <span class="status" id="status"><span class="spinner" id="spinner"></span><span id="status-text">Press New Game to start</span></span>
            <span class="stats" id="stats"></span>
        </div>

        <div class="legend">
            <div class="legend-item">
                <span class="legend-dot player"></span>
                <span>You</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot ai"></span>
                <span>AI</span>
            </div>
            <div class="slot-indicator">
                <span class="slot-count" id="slot-count">--/-- slots</span>
                <button class="slot-refresh" id="slot-refresh" title="Refresh slot count">&#x21bb;</button>
            </div>
        </div>

        <div class="debug-panel" id="debug-panel">
            <div class="debug-row"><span>Depth:</span><span id="dbg-depth">-</span></div>
            <div class="debug-row"><span>Instant Win:</span><span id="dbg-win">-</span></div>
            <div class="debug-row"><span>Must Block:</span><span id="dbg-block">-</span></div>
            <div class="debug-scores" id="dbg-scores">
                <div class="debug-col"><div class="num">1</div><div class="score">-</div></div>
                <div class="debug-col"><div class="num">2</div><div class="score">-</div></div>
                <div class="debug-col"><div class="num">3</div><div class="score">-</div></div>
                <div class="debug-col"><div class="num">4</div><div class="score">-</div></div>
                <div class="debug-col"><div class="num">5</div><div class="score">-</div></div>
                <div class="debug-col"><div class="num">6</div><div class="score">-</div></div>
                <div class="debug-col"><div class="num">7</div><div class="score">-</div></div>
            </div>
            <div class="debug-chose">AI Chose: <span id="dbg-chose">-</span></div>
        </div>

        <footer><footer>
            <p>Original Lisp engine by Andrew McDonald</p>
            <p>Minimax with α-β pruning</p>
            <p class="keys">1-7 drop · ← → select · enter confirm</p>
            <p class="version">v3.2</p>
        </footer>
    </div>

    <script src="game-client.js"></script>
</body>
</html>
